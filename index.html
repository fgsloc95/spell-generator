<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Spell Engine v1.0 - OTClient</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --accent: #c9a86a; --text: #adbac7; --input: #090c10;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Formulario */
        .form-box { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 20px; border-radius: 8px; margin-bottom: 30px; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .form-box h2 { grid-column: 1 / -1; margin: 0; color: #fff; }
        input, textarea, select { 
            background: var(--input); border: 1px solid var(--border); 
            padding: 10px; color: #fff; border-radius: 4px; 
        }
        textarea { height: 80px; grid-column: 1 / -1; }
        .full-width { grid-column: 1 / -1; }
        button { 
            background: var(--accent); color: #000; border: none; 
            padding: 12px; cursor: pointer; font-weight: bold; border-radius: 4px; 
        }

        /* Dashboard de Classes */
        .class-group { margin-top: 20px; border: 1px solid var(--border); border-radius: 8px; }
        .class-header { 
            background: #21262d; padding: 15px; cursor: pointer; 
            font-weight: bold; display: flex; justify-content: space-between;
        }
        .spell-grid { 
            display: none; padding: 20px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; 
        }
        .active { display: grid; }

        /* Card Visual (Baseado na sua Imagem 2) */
        .spell-card {
            background: #000; border: 2px solid var(--border); padding: 15px;
            display: flex; flex-direction: column; gap: 8px; text-align: center;
        }
        .c-header { color: var(--accent); font-size: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .c-icon { width: 48px; height: 48px; border: 1px solid #444; margin: 5px auto; display:flex; align-items:center; justify-content:center; font-size:10px;}
        .c-name { background: #1c2128; padding: 5px; font-weight: bold; border: 1px solid #333; }
        .c-desc { font-size: 12px; color: #888; text-align: left; min-height: 40px; }
        .c-stats { color: #58a6ff; font-weight: bold; font-size: 13px; }
        .c-tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
        .tag { background: #232d38; font-size: 10px; padding: 2px 6px; border-radius: 3px; border: 1px solid #3d444d; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-box">
        <h2>Criar Nova Spell</h2>
        <select id="fClass">
            <option value="Warrior">Warrior</option><option value="Mage">Mage</option>
            <option value="Scout">Scout</option><option value="Druid">Druid</option>
        </select>
        <input type="text" id="fWeapons" placeholder="Armas (Ex: Sword, Axe)">
        <input type="text" id="fName" placeholder="Nome da Skill">
        <input type="text" id="fStats" placeholder="Dano (Ex: 40-60 Physical)">
        <textarea id="fDesc" placeholder="Descrição completa da skill..."></textarea>
        <input type="text" id="fTags" placeholder="Tags separadas por vírgula (Ex: AOE, Melee, Fire)" class="full-width">
        <button onclick="saveSpell()" class="full-width">SALVAR NO GRIMÓRIO</button>
    </div>

    <div id="displayArea"></div>
</div>

<script>
    let spells = JSON.parse(localStorage.getItem('mySpells')) || [];

    function saveSpell() {
        const newSpell = {
            id: Date.now(),
            classe: document.getElementById('fClass').value,
            weapons: document.getElementById('fWeapons').value,
            name: document.getElementById('fName').value,
            stats: document.getElementById('fStats').value,
            desc: document.getElementById('fDesc').value,
            tags: document.getElementById('fTags').value.split(',')
        };
        spells.push(newSpell);
        localStorage.setItem('mySpells', JSON.stringify(spells));
        renderSpells();
    }

    function renderSpells() {
        const area = document.getElementById('displayArea');
        const classes = ['Warrior', 'Mage', 'Scout', 'Druid'];
        area.innerHTML = '';

        classes.forEach(cls => {
            const classSpells = spells.filter(s => s.classe === cls);
            const section = document.createElement('div');
            section.className = 'class-group';
            section.innerHTML = `
                <div class="class-header" onclick="this.nextElementSibling.classList.toggle('active')">
                    ${cls.toUpperCase()} (${classSpells.length}) <span>▼</span>
                </div>
                <div class="spell-grid">
                    ${classSpells.map(s => `
                        <div class="spell-card">
                            <div class="c-header">${s.classe.toUpperCase()} | ${s.weapons}</div>
                            <div class="c-icon">ICON</div>
                            <div class="c-name">${s.name}</div>
                            <div class="c-desc">${s.desc}</div>
                            <div class="c-stats">${s.stats}</div>
                            <div class="c-tags">${s.tags.map(t => `<span class="tag">${t.trim()}</span>`).join('')}</div>
                            <button onclick="deleteSpell(${s.id})" style="background:transparent; color:red; font-size:10px; margin-top:10px;">Deletar</button>
                        </div>
                    `).join('')}
                </div>
            `;
            area.appendChild(section);
        });
    }

    function deleteSpell(id) {
        spells = spells.filter(s => s.id !== id);
        localStorage.setItem('mySpells', JSON.stringify(spells));
        renderSpells();
    }

    renderSpells();
</script>
</body>
</html>
