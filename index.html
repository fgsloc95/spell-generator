<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Spell Engine v1.2 - Automação Total</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --accent: #c9a86a; --text: #adbac7; --input: #090c10;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        
        .top-section { display: grid; grid-template-columns: 380px 1fr; gap: 30px; margin-bottom: 40px; }

        /* Estilização dos Inputs conforme a imagem */
        .form-box { 
            background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .input-label { font-size: 11px; text-transform: uppercase; color: #666; margin-bottom: -5px; margin-left: 2px; }
        
        input, textarea, select { 
            background: var(--input); border: 1px solid var(--border); 
            padding: 12px; color: #fff; border-radius: 4px; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        /* Cores das Bordas conforme seu esboço */
        .border-classe { border-left: 4px solid #4b00ff !important; }
        .border-armas { border-left: 4px solid #00d4ff !important; }
        .border-nome { border-left: 4px solid #ffeb00 !important; }
        .border-desc { border-left: 4px solid #ff0000 !important; }
        .border-tags { border-left: 4px solid #ffffff !important; }

        /* Seletor de Ícones */
        .icon-selector-box { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; }
        .icon-grid {
            display: grid; grid-template-columns: repeat(auto-fill, 50px);
            gap: 12px; max-height: 400px; overflow-y: auto; padding: 15px; background: #05070a; border-radius: 4px;
        }
        .icon-option {
            width: 44px; height: 44px; border: 2px solid #222; cursor: pointer;
            object-fit: contain; image-rendering: pixelated; transition: 0.2s;
        }
        .icon-option:hover { transform: scale(1.1); border-color: #555; }
        .icon-option.selected { border-color: #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.3); }

        /* Card Visual */
        .spell-card {
            background: #000; border: 4px solid #222; padding: 20px;
            display: flex; flex-direction: column; gap: 12px; text-align: center; width: 300px;
        }
        .c-icon-img { width: 80px; height: 80px; margin: 0 auto; object-fit: contain; image-rendering: pixelated; border: 2px solid #00ff00; padding: 5px; }

        .btn-save { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 15px; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .btn-save:hover { background: #e0bc7a; }
    </style>
</head>
<body>

<div class="top-section">
    <div class="form-box">
        <h2 style="margin:0 0 10px 0; color:#fff">CRIAR SPELL</h2>
        
        <span class="input-label">Classe</span>
        <select id="fClass" class="border-classe">
            <option value="Warrior">Warrior</option><option value="Mage">Mage</option>
            <option value="Scout">Scout</option><option value="Druid">Druid</option>
        </select>

        <span class="input-label">Armas Permitidas</span>
        <input type="text" id="fWeapons" class="border-armas" placeholder="Sword, Axe, Mace...">

        <span class="input-label">Nome da Spell</span>
        <input type="text" id="fName" class="border-nome" placeholder="Ex: Berserk Strike">

        <span class="input-label">Descrição da Skill</span>
        <textarea id="fDesc" class="border-desc" placeholder="O que a skill faz..."></textarea>

        <span class="input-label">Dano / Elemento</span>
        <input type="text" id="fStats" placeholder="Ex: 100-200 Fire Damage">

        <span class="input-label">Palavras Chave (Tags)</span>
        <input type="text" id="fTags" class="border-tags" placeholder="Melee, Area, Physical...">

        <input type="hidden" id="fSelectedIcon" value="">
        <button onclick="saveSpell()" class="btn-save">SALVAR NO GRIMÓRIO</button>
    </div>

    <div class="icon-selector-box">
        <h3 style="margin:0 0 15px 0">BIBLIOTECA DE ÍCONES (Auto-Scan)</h3>
        <div class="icon-grid" id="iconGrid">Carregando ícones do repositório...</div>
    </div>
</div>

<div id="displayArea"></div>

<script>
    // --- CONFIGURAÇÃO DO GITHUB ---
    const username = 'fgsloc95'; 
    const repo = 'spell-generator';
    const folder = 'icons'; // Nome da pasta onde estão seus ícones

    let spells = JSON.parse(localStorage.getItem('mySpells')) || [];

    // Função para ler a pasta do GitHub automaticamente
    async function loadIconsFromGithub() {
        const grid = document.getElementById('iconGrid');
        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
            const files = await response.json();
            
            grid.innerHTML = ''; // Limpa o "carregando"

            files.forEach(file => {
                if(file.name.match(/\.(png|jpg|jpeg|gif)$/i)) {
                    const img = document.createElement('img');
                    img.src = file.download_url;
                    img.className = 'icon-option';
                    img.title = file.name;
                    img.onclick = function() {
                        document.querySelectorAll('.icon-option').forEach(i => i.classList.remove('selected'));
                        this.classList.add('selected');
                        document.getElementById('fSelectedIcon').value = file.download_url;
                    };
                    grid.appendChild(img);
                }
            });
        } catch (error) {
            grid.innerHTML = 'Erro ao carregar ícones. Verifique o nome do usuário e repositório no código.';
        }
    }

    function saveSpell() {
        const icon = document.getElementById('fSelectedIcon').value;
        if(!icon) return alert("Selecione um ícone antes de salvar!");

        const newSpell = {
            id: Date.now(),
            classe: document.getElementById('fClass').value,
            weapons: document.getElementById('fWeapons').value,
            name: document.getElementById('fName').value,
            stats: document.getElementById('fStats').value,
            desc: document.getElementById('fDesc').value,
            icon: icon,
            tags: document.getElementById('fTags').value.split(',')
        };
        spells.push(newSpell);
        localStorage.setItem('mySpells', JSON.stringify(spells));
        renderSpells();
    }

    function renderSpells() {
        const area = document.getElementById('displayArea');
        const classes = ['Warrior', 'Mage', 'Scout', 'Druid'];
        area.innerHTML = '';

        classes.forEach(cls => {
            const classSpells = spells.filter(s => s.classe === cls);
            const section = document.createElement('div');
            section.className = 'class-group'; // Usando a mesma lógica de acordeão anterior
            // ... (restante da lógica de renderização idêntica ao anterior, apenas usando s.icon direto como URL)
            // Vou focar no visual do Card conforme sua imagem:
            
            let html = `<div style="margin-top:20px; border-bottom:1px solid #333; padding:10px; font-weight:bold">${cls.toUpperCase()}</div><div style="display:flex; flex-wrap:wrap; gap:20px; padding:20px;">`;
            
            classSpells.forEach(s => {
                html += `
                <div class="spell-card">
                    <div style="color:#4b00ff; font-size:12px; font-weight:bold; border:1px solid #4b00ff; padding:2px;">${s.classe}</div>
                    <img src="${s.icon}" class="c-icon-img">
                    <div style="color:#00d4ff; font-size:11px; border:1px solid #00d4ff; padding:2px;">${s.weapons}</div>
                    <div style="background:#1c2128; color:#ffeb00; border:1px solid #ffeb00; padding:5px; font-weight:bold;">${s.name}</div>
                    <div style="color:#ff0000; border:1px solid #ff0000; padding:10px; font-size:13px; text-align:left; min-height:60px;">${s.desc}</div>
                    <div style="border:1px solid #fff; padding:5px; font-size:12px;">${s.stats}</div>
                    <div style="border:1px solid #fff; padding:5px; display:flex; gap:5px; justify-content:center; flex-wrap:wrap;">
                        ${s.tags.map(t => `<span style="font-size:10px; background:#222; padding:2px 5px;">${t.trim()}</span>`).join('')}
                    </div>
                    <button onclick="deleteSpell(${s.id})" style="background:none; border:none; color:red; cursor:pointer; font-size:10px;">DELETAR</button>
                </div>`;
            });
            html += `</div>`;
            area.innerHTML += html;
        });
    }

    function deleteSpell(id) {
        spells = spells.filter(s => s.id !== id);
        localStorage.setItem('mySpells', JSON.stringify(spells));
        renderSpells();
    }

    loadIconsFromGithub();
    renderSpells();
</script>
</body>
</html>
