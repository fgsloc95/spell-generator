<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Spell Engine v1.5 - Override System</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --accent: #c9a86a; --text: #adbac7; --input: #090c10;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .top-section { display: grid; grid-template-columns: 420px 1fr; gap: 30px; margin-bottom: 40px; }
        .form-box { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        .input-label { font-size: 11px; text-transform: uppercase; color: #666; margin-bottom: 2px; margin-left: 2px; }
        input, textarea, select { background: var(--input); border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 4px; font-size: 14px; outline: none; width: 100%; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .selector-container { display: flex; flex-wrap: wrap; gap: 5px; background: #05070a; padding: 8px; border: 1px solid var(--border); border-radius: 4px; min-height: 40px; }
        .sel-btn { background: #21262d; border: 1px solid #30363d; color: #adbac7; padding: 4px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; }
        .sel-btn.active { border-color: #58a6ff; color: #58a6ff; background: rgba(56, 139, 253, 0.1); }
        .icon-selector-box { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, 50px); gap: 12px; max-height: 600px; overflow-y: auto; padding: 15px; background: #05070a; border-radius: 4px; }
        .icon-option { width: 44px; height: 44px; border: 2px solid #222; cursor: pointer; object-fit: contain; image-rendering: pixelated; }
        .icon-option.selected { border-color: #00ff00; }
        .tag-pill { background: #222; color: #58a6ff; padding: 3px 8px; font-size: 10px; border-bottom: 1px solid #444; border-right: 1px solid #444; }
        .spell-card { background: #000; border: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 12px; text-align: center; width: 280px; border-radius: 4px; position: relative; }
        .c-classe { color: #8b949e; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .c-icon-img { width: 64px; height: 64px; margin: 0 auto; object-fit: contain; image-rendering: pixelated; }
        .c-armas { color: #00d4ff; font-size: 13px; font-weight: 500; }
        .c-nome { color: #ffffff; font-size: 18px; font-weight: bold; }
        .c-desc-box { border: 1px solid #ffffff; padding: 12px; font-size: 14px; text-align: left; min-height: 60px; color: #fff; }
        .c-stats { color: #ffeb00; font-weight: bold; font-size: 15px; }
        .c-tags-area { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
        .c-extra { display: flex; justify-content: space-between; font-size: 11px; color: #666; border-top: 1px solid #222; padding-top: 8px; }
        .btn-save { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 15px; cursor: pointer; margin-top: 10px; border-radius: 4px; }
        .override-badge { position: absolute; top: 5px; right: 5px; background: #f85149; color: white; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-section">
    <div class="form-box">
        <h2 id="formTitle" style="margin:0; color:#fff">SPELL MAKER</h2>
        
        <span class="input-label">Classe</span>
        <select id="fClass">
            <optgroup label="Warrior & Ascensões">
                <option value="Warrior">Warrior</option>
                <option value="Dark Knight">Dark Knight</option>
                <option value="Bastion">Bastion</option>
                <option value="Paladin">Paladin</option>
                <option value="Spell Blade">Spell Blade</option>
            </optgroup>
            <optgroup label="Mage & Ascensões">
                <option value="Mage">Mage</option>
                <option value="Necromancer">Necromancer</option>
                <option value="Blood Mage">Blood Mage</option>
                <option value="Elementarist">Elementarist</option>
                <option value="Cleric">Cleric</option>
            </optgroup>
            <optgroup label="Scout & Ascensões">
                <option value="Scout">Scout</option>
                <option value="Assassin">Assassin</option>
                <option value="Dead Eye">Dead Eye</option>
                <option value="Ballisteer">Ballisteer</option>
                <option value="Bard">Bard</option>
            </optgroup>
            <optgroup label="Druid & Ascensões">
                <option value="Druid">Druid</option>
                <option value="Nature">Nature</option>
                <option value="ShapeShifter">ShapeShifter</option>
                <option value="TotemMaster">TotemMaster</option>
                <option value="FungalMaster">FungalMaster</option>
            </optgroup>
        </select>

        <span class="input-label">Nome da Spell</span>
        <input type="text" id="fName" placeholder="Ex: Berserk Strike">

        <span class="input-label">Substitui qual Skill? (Vazio = Nenhuma)</span>
        <select id="fReplaces">
            <option value="">-- Habilidade Original --</option>
            </select>

        <span class="input-label">Armas Permitidas</span>
        <div class="selector-container" id="weaponSelector"></div>

        <div class="row">
            <div style="flex:1"><span class="input-label">Cast (0=Inst)</span><input type="number" id="fCast" step="0.1" value="0"></div>
            <div style="flex:1"><span class="input-label">CD (seg)</span><input type="number" id="fCooldown" step="0.1" value="2"></div>
            <div style="flex:1"><span class="input-label">Range</span><input type="number" id="fRange" value="1"></div>
        </div>

        <span class="input-label">Descrição</span>
        <textarea id="fDesc"></textarea>

        <span class="input-label">Dano / Elemento</span>
        <input type="text" id="fStats">

        <span class="input-label">Tags</span>
        <div class="selector-container" id="tagSelector"></div>

        <input type="hidden" id="fSelectedIcon" value="">
        <button id="mainBtn" onclick="saveSpell()" class="btn-save">SALVAR SPELL</button>
    </div>

    <div class="icon-selector-box">
        <h3 style="margin:0 0 15px 0">BIBLIOTECA DE ÍCONES</h3>
        <div class="icon-grid" id="iconGrid">Carregando ícones...</div>
    </div>
</div>

<div id="displayArea"></div>

<script>
    const username = 'fgsloc95'; 
    const repo = 'spell-generator';
    const folder = 'icons';

    const classInheritance = {
        'Dark Knight': ['Warrior'], 'Bastion': ['Warrior'], 'Paladin': ['Warrior'], 'Spell Blade': ['Warrior'],
        'Necromancer': ['Mage'], 'Blood Mage': ['Mage'], 'Elementarist': ['Mage'], 'Cleric': ['Mage'],
        'Assassin': ['Scout'], 'Dead Eye': ['Scout'], 'Ballisteer': ['Scout'], 'Bard': ['Scout'],
        'Nature': ['Druid'], 'ShapeShifter': ['Druid'], 'TotemMaster': ['Druid'], 'FungalMaster': ['Druid']
    };

    const listWeapons = ['Sword', 'Axe', 'Mace', 'Staff 2H', 'Wand 1H', 'Bow', 'Crossbow', 'Knife', 'Spear', 'Shield'];
    const listTags = [
        'Melee', 'AoE', 'Single', 'Ranged', 'Chain', 'Wave', 'DoT',
        'Physical', 'Fire', 'Ice', 'Energy', 'Earth', 'Death', 'Holy', 'Poison', 'Curse', 'Weapon Element', 'Random Element',
        'Buff', 'Stun', 'Slow', 'Snare', 'Freeze', 'Heal', 'Life Regen', 'Max Life', 'Shield', 'Bleed', 'Silence', 'Max Mana', 'Mana Regen', 
        'Passive', 'Effect', 'Cleanse', 'Aura', 'Movement', 'Taunt', 'Summon', 'Knockback', 'Lifesteal', 'Execute', 'Ultimate'
    ];

    let selectedWeapons = [];
    let selectedTags = [];
    let spells = JSON.parse(localStorage.getItem('mySpells')) || [];
    let editingId = null;

    function initSelectors() {
        const wArea = document.getElementById('weaponSelector');
        const tArea = document.getElementById('tagSelector');
        wArea.innerHTML = ''; tArea.innerHTML = '';
        
        listWeapons.forEach(w => {
            const b = document.createElement('div'); b.className = 'sel-btn'; b.innerText = w;
            b.onclick = () => { b.classList.toggle('active'); if(selectedWeapons.includes(w)) selectedWeapons = selectedWeapons.filter(x=>x!==w); else selectedWeapons.push(w); };
            wArea.appendChild(b);
        });

        listTags.forEach(t => {
            const b = document.createElement('div'); b.className = 'sel-btn'; b.innerText = t;
            b.onclick = () => { b.classList.toggle('active'); if(selectedTags.includes(t)) selectedTags = selectedTags.filter(x=>x!==t); else selectedTags.push(t); };
            tArea.appendChild(b);
        });
        updateOverrideList();
    }

    function updateOverrideList() {
        const select = document.getElementById('fReplaces');
        const currentVal = select.value;
        select.innerHTML = '<option value="">-- Habilidade Original --</option>';
        spells.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.name;
            opt.innerText = `${s.name} (${s.classe})`;
            select.appendChild(opt);
        });
        select.value = currentVal;
    }

    async function loadIconsFromGithub() {
        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
            const files = await response.json();
            const urls = files.filter(f => f.name.match(/\.(png|jpg|jpeg|gif)$/i)).map(f => f.download_url);
            renderIconGrid(urls);
        } catch (e) { console.error("Erro API"); }
    }

    function renderIconGrid(urls) {
        const grid = document.getElementById('iconGrid'); grid.innerHTML = '';
        urls.forEach(url => {
            const img = document.createElement('img'); img.src = url; img.className = 'icon-option';
            img.onclick = function() {
                document.querySelectorAll('.icon-option').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('fSelectedIcon').value = url;
            };
            grid.appendChild(img);
        });
    }

    function saveSpell() {
        const icon = document.getElementById('fSelectedIcon').value;
        if(!icon) return alert("Selecione um ícone!");

        const spellData = {
            id: editingId ? editingId : Date.now(),
            classe: document.getElementById('fClass').value,
            replaces: document.getElementById('fReplaces').value,
            weapons: selectedWeapons.join(', '),
            name: document.getElementById('fName').value,
            stats: document.getElementById('fStats').value,
            desc: document.getElementById('fDesc').value,
            cast: document.getElementById('fCast').value,
            cooldown: document.getElementById('fCooldown').value,
            range: document.getElementById('fRange').value,
            icon: icon,
            tags: selectedTags
        };

        if (editingId) {
            const index = spells.findIndex(s => s.id === editingId);
            spells[index] = spellData;
            editingId = null;
        } else {
            spells.push(spellData);
        }

        localStorage.setItem('mySpells', JSON.stringify(spells));
        location.reload();
    }

    function renderSpells() {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        const allClasses = [
            'Warrior', 'Dark Knight', 'Bastion', 'Paladin', 'Spell Blade', 
            'Mage', 'Necromancer', 'Blood Mage', 'Elementarist', 'Cleric', 
            'Scout', 'Assassin', 'Dead Eye', 'Ballisteer', 'Bard', 
            'Druid', 'Nature', 'ShapeShifter', 'TotemMaster', 'FungalMaster'
        ];

        allClasses.forEach(displayClass => {
            let classSpells = spells.filter(s => {
                const isDirect = s.classe === displayClass;
                const parents = classInheritance[displayClass] || [];
                return isDirect || parents.includes(s.classe);
            });

            const overrides = classSpells.filter(s => s.classe === displayClass && s.replaces !== "");
            const namesToHide = overrides.map(o => o.replaces);
            classSpells = classSpells.filter(s => !namesToHide.includes(s.name) || s.classe === displayClass);

            if(classSpells.length === 0) return;

            let html = `<div style="margin:40px 0 10px 0; border-bottom:1px solid #333; padding-bottom:5px; color:var(--accent); font-weight:bold">${displayClass.toUpperCase()}</div>`;
            html += `<div style="display:flex; flex-wrap:wrap; gap:25px;">`;
            
            classSpells.forEach(s => {
                const isOverride = s.replaces !== "" && s.classe === displayClass;
                html += `
                <div class="spell-card">
                    ${isOverride ? `<div class="override-badge">REPLACES ${s.replaces}</div>` : ''}
                    <div class="c-classe">${s.classe}</div>
                    <img src="${s.icon}" class="c-icon-img">
                    <div class="c-armas">${s.weapons}</div>
                    <div class="c-nome">${s.name}</div>
                    <div class="c-desc-box">${s.desc}</div>
                    <div class="c-stats">${s.stats}</div>
                    <div class="c-tags-area">${s.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>
                    <div class="c-extra">
                        <span>Cast: <b>${s.cast == 0 ? "Inst" : s.cast+'s'}</b></span>
                        <span>CD: <b>${s.cooldown}s</b></span>
                        <span>RG: <b>${s.range || 1}</b></span>
                    </div>
                    <div style="display:flex; justify-content:center; gap:10px; margin-top:5px;">
                        <button style="color:#58a6ff; background:none; border:1px solid #333; cursor:pointer; font-size:10px;" onclick="editSpell(${s.id})">EDITAR</button>
                        <button onclick="deleteSpell(${s.id})" style="background:none; border:none; color:#444; cursor:pointer; font-size:10px;">Deletar</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
            area.innerHTML += html;
        });
    }

    function editSpell(id) {
        const s = spells.find(x => x.id === id);
        if(!s) return;
        editingId = id;
        document.getElementById('fClass').value = s.classe;
        document.getElementById('fName').value = s.name;
        document.getElementById('fReplaces').value = s.replaces || "";
        document.getElementById('fCast').value = s.cast;
        document.getElementById('fCooldown').value = s.cooldown;
        document.getElementById('fRange').value = s.range || 1;
        document.getElementById('fDesc').value = s.desc;
        document.getElementById('fStats').value = s.stats;
        document.getElementById('fSelectedIcon').value = s.icon;
        document.getElementById('mainBtn').innerText = "ATUALIZAR";
        window.scrollTo(0,0);
    }

    function deleteSpell(id) { if(confirm("Deletar?")) { spells = spells.filter(s => s.id !== id); localStorage.setItem('mySpells', JSON.stringify(spells)); renderSpells(); } }

    initSelectors();
    loadIconsFromGithub();
    renderSpells();
</script>
</body>
</html>
