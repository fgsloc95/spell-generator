<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Spell Engine v1.2 - Clean Edition</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --accent: #c9a86a; --text: #adbac7; --input: #090c10;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        
        .top-section { display: grid; grid-template-columns: 380px 1fr; gap: 30px; margin-bottom: 40px; }

        .form-box { 
            background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .input-label { font-size: 11px; text-transform: uppercase; color: #666; margin-bottom: -5px; margin-left: 2px; }
        
        input, textarea, select { 
            background: var(--input); border: 1px solid var(--border); 
            padding: 12px; color: #fff; border-radius: 4px; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        /* Estilo Biblioteca */
        .icon-selector-box { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; }
        .icon-grid {
            display: grid; grid-template-columns: repeat(auto-fill, 50px);
            gap: 12px; max-height: 400px; overflow-y: auto; padding: 15px; background: #05070a; border-radius: 4px;
        }
        .icon-option {
            width: 44px; height: 44px; border: 2px solid #222; cursor: pointer;
            object-fit: contain; image-rendering: pixelated; transition: 0.2s;
        }
        .icon-option:hover { transform: scale(1.1); border-color: #555; }
        .icon-option.selected { border-color: #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.3); }

        /* Card Visual Clean - Conforme solicitado */
        .spell-card {
            background: #000; border: 1px solid #30363d; padding: 20px;
            display: flex; flex-direction: column; gap: 12px; text-align: center; width: 280px;
            border-radius: 4px;
        }
        .c-classe { color: #8b949e; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .c-icon-img { width: 64px; height: 64px; margin: 0 auto; object-fit: contain; image-rendering: pixelated; }
        .c-armas { color: #00d4ff; font-size: 13px; font-weight: 500; }
        .c-nome { color: #ffffff; font-size: 18px; font-weight: bold; }
        .c-desc-box { border: 1px solid #ffffff; padding: 12px; font-size: 14px; text-align: left; min-height: 60px; color: #fff; line-height: 1.4; }
        .c-stats { color: #ffeb00; font-weight: bold; font-size: 15px; }
        .c-tags-area { color: #adbac7; font-size: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        
        .btn-save { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 15px; cursor: pointer; margin-top: 10px; font-size: 16px; border-radius: 4px; }
        .btn-edit { background: #232d38; color: #58a6ff; border: 1px solid #30363d; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; transition: 0.2s; }
        .btn-edit:hover { background: #30363d; }
    </style>
</head>
<body>

<div class="top-section">
    <div class="form-box">
        <h2 id="formTitle" style="margin:0 0 10px 0; color:#fff">CRIAR NOVA SPELL</h2>
        
        <span class="input-label">Classe</span>
        <select id="fClass">
            <option value="Warrior">Warrior</option>
            <option value="Mage">Mage</option>
            <option value="Scout">Scout</option>
            <option value="Druid">Druid</option>
        </select>

        <span class="input-label">Armas Permitidas</span>
        <input type="text" id="fWeapons" placeholder="Sword, Axe, Mace...">

        <span class="input-label">Nome da Spell</span>
        <input type="text" id="fName" placeholder="Ex: Berserk Strike">

        <span class="input-label">Descrição da Skill</span>
        <textarea id="fDesc" placeholder="O que a skill faz..."></textarea>

        <span class="input-label">Dano / Elemento</span>
        <input type="text" id="fStats" placeholder="Ex: 100-200 Fire Damage">

        <span class="input-label">Palavras Chave (Tags)</span>
        <input type="text" id="fTags" placeholder="Melee, Area, Physical...">

        <input type="hidden" id="fSelectedIcon" value="">
        <button id="mainBtn" onclick="saveSpell()" class="btn-save">SALVAR NO GRIMÓRIO</button>
    </div>

    <div class="icon-selector-box">
        <h3 style="margin:0 0 15px 0">SELECIONE O ÍCONE DA SKILL</h3>
        <div class="icon-grid" id="iconGrid">Carregando ícones do repositório...</div>
    </div>
</div>

<div id="displayArea"></div>

<script>
    const username = 'fgsloc95'; 
    const repo = 'spell-generator';
    const folder = 'icons';

    let spells = JSON.parse(localStorage.getItem('mySpells')) || [];
    let editingId = null;

    // Cache Inteligente para evitar Rate Limit do GitHub
    async function loadIconsFromGithub() {
        const grid = document.getElementById('iconGrid');
        const cached = localStorage.getItem('github_icons_cache');
        
        if (cached) renderIconGrid(JSON.parse(cached));

        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
            if(!response.ok) throw new Error();
            const files = await response.json();
            const urls = files.filter(f => f.name.match(/\.(png|jpg|jpeg|gif)$/i)).map(f => f.download_url);
            
            localStorage.setItem('github_icons_cache', JSON.stringify(urls));
            renderIconGrid(urls);
        } catch (e) {
            if(!cached) grid.innerHTML = 'Erro ao carregar ícones da API.';
        }
    }

    function renderIconGrid(urls) {
        const grid = document.getElementById('iconGrid');
        grid.innerHTML = '';
        urls.forEach(url => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'icon-option';
            img.onclick = function() {
                document.querySelectorAll('.icon-option').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('fSelectedIcon').value = url;
            };
            grid.appendChild(img);
        });
    }

    function saveSpell() {
        const icon = document.getElementById('fSelectedIcon').value;
        if(!icon) return alert("Selecione um ícone!");

        const spellData = {
            id: editingId ? editingId : Date.now(),
            classe: document.getElementById('fClass').value,
            weapons: document.getElementById('fWeapons').value,
            name: document.getElementById('fName').value,
            stats: document.getElementById('fStats').value,
            desc: document.getElementById('fDesc').value,
            icon: icon,
            tags: document.getElementById('fTags').value.split(',').map(t => t.trim())
        };

        if (editingId) {
            const index = spells.findIndex(s => s.id === editingId);
            spells[index] = spellData;
            editingId = null;
            document.getElementById('mainBtn').innerText = "SALVAR NO GRIMÓRIO";
            document.getElementById('formTitle').innerText = "CRIAR NOVA SPELL";
        } else {
            spells.push(spellData);
        }

        localStorage.setItem('mySpells', JSON.stringify(spells));
        clearForm();
        renderSpells();
    }

    function editSpell(id) {
        const spell = spells.find(s => s.id === id);
        if (!spell) return;

        document.getElementById('fClass').value = spell.classe;
        document.getElementById('fWeapons').value = spell.weapons;
        document.getElementById('fName').value = spell.name;
        document.getElementById('fStats').value = spell.stats;
        document.getElementById('fDesc').value = spell.desc;
        document.getElementById('fTags').value = spell.tags.join(', ');
        document.getElementById('fSelectedIcon').value = spell.icon;

        editingId = id;
        document.getElementById('mainBtn').innerText = "ATUALIZAR SKILL";
        document.getElementById('formTitle').innerText = "EDITANDO SPELL";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteSpell(id) {
        if(confirm("Deseja deletar esta skill?")) {
            spells = spells.filter(s => s.id !== id);
            localStorage.setItem('mySpells', JSON.stringify(spells));
            renderSpells();
        }
    }

    function clearForm() {
        document.getElementById('fWeapons').value = '';
        document.getElementById('fName').value = '';
        document.getElementById('fStats').value = '';
        document.getElementById('fDesc').value = '';
        document.getElementById('fTags').value = '';
        document.getElementById('fSelectedIcon').value = '';
        document.querySelectorAll('.icon-option').forEach(i => i.classList.remove('selected'));
    }

    function renderSpells() {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        const classes = ['Warrior', 'Mage', 'Scout', 'Druid'];

        classes.forEach(cls => {
            const classSpells = spells.filter(s => s.classe === cls);
            if(classSpells.length === 0) return;

            let html = `<div style="margin:40px 0 10px 0; border-bottom:1px solid #333; padding-bottom:10px; font-weight:bold; color:var(--accent)">${cls.toUpperCase()} (${classSpells.length})</div>`;
            html += `<div style="display:flex; flex-wrap:wrap; gap:25px;">`;
            
            classSpells.forEach(s => {
                html += `
                <div class="spell-card">
                    <div class="c-classe">${s.classe}</div>
                    <img src="${s.icon}" class="c-icon-img">
                    <div class="c-armas">${s.weapons}</div>
                    <div class="c-nome">${s.name}</div>
                    <div class="c-desc-box">${s.desc}</div>
                    <div class="c-stats">${s.stats}</div>
                    <div class="c-tags-area">
                        ${s.tags.map(t => `<span>#${t}</span>`).join('')}
                    </div>
                    <div style="display:flex; justify-content:center; gap:15px; margin-top:10px; border-top: 1px solid #222; padding-top:10px;">
                        <button class="btn-edit" onclick="editSpell(${s.id})">EDITAR</button>
                        <button onclick="deleteSpell(${s.id})" style="background:none; border:none; color:#666; cursor:pointer; font-size:10px;">Deletar</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
            area.innerHTML += html;
        });
    }

    loadIconsFromGithub();
    renderSpells();
</script>

</body>
</html>
